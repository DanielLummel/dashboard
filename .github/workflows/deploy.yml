name: Deploy to All-Inkl

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, pdo, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Create .env for production
        run: |
          cp .env.example .env
          sed -i 's|APP_ENV=local|APP_ENV=production|' .env
          sed -i 's|APP_DEBUG=true|APP_DEBUG=false|' .env
          sed -i "s|APP_URL=.*|APP_URL=${{ secrets.APP_URL }}|" .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          sed -i 's|DB_CONNECTION=sqlite|DB_CONNECTION=mysql|' .env
          sed -i "s|DB_DATABASE=database/database.sqlite|DB_DATABASE=${{ secrets.DB_DATABASE }}|" .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: ZIP alles zusammen
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*/node_modules/*" \
            --exclude "*/.ddev/*" \
            --exclude "*/tests/*" \
            --exclude ".env.example" \
            --exclude "README.md"

      - name: ZIP + deploy.php per FTP hochladen
        run: |
          curl -T deploy.zip --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/deploy.zip"
          curl -T deploy.php --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/html/deploy.php"

      - name: Deploy-Script aufrufen (entpackt ZIP auf Server)
        run: |
          curl "${{ secrets.APP_URL }}/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}"
